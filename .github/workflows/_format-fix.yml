name: Format Fix (manual)

# One-shot manual workflow used to apply clang-format-19 inside the
# CI container (which has the canonical formatter version) and push
# the result back to main. The workflow file itself is removed
# immediately after the fix lands; if you are reading this in a
# committed state on main, that means cleanup did not happen and
# the file should be deleted by hand.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN has contents:write here (granted
          # above) and is sufficient to push to main since the
          # branch has no protection rules requiring PR review.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format-19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-19
          clang-format-19 --version

      - name: Apply clang-format-19
        run: |
          find src include stdlib \
            \( -name '*.c' -o -name '*.h' \) -type f \
            | xargs clang-format-19 -i

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formatting changes were necessary."
            exit 0
          fi
          git add -A
          git diff --cached --stat
          git commit -m "Apply clang-format-19 to JIT diagnostic and x64 codegen"
          git push origin HEAD:main
