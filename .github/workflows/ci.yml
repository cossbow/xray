name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ===========================================================================
  # Architecture lint (Phase 3, X-01 / C-01 / C-02)
  # Fast grep-only check that catches frontend boundary violations
  # before we spend a build-budget. See scripts/check_frontend_arch.sh
  # for the rule list.
  # ===========================================================================
  arch-lint:
    runs-on: ubuntu-latest
    name: Frontend Architecture Lint
    steps:
    - uses: actions/checkout@v4

    - name: Run frontend architecture lint
      run: |
        chmod +x ./scripts/check_frontend_arch.sh
        ./scripts/check_frontend_arch.sh

  # ===========================================================================
  # Build & Test (multi-platform)
  # ===========================================================================
  build:
    needs: arch-lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
    - uses: actions/checkout@v4

    - name: Configure (Unix)
      if: runner.os != 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Configure (Windows)
      if: runner.os == 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Verify binary
      if: runner.os != 'Windows'
      run: ./build/xray --version

    - name: Verify binary (Windows)
      if: runner.os == 'Windows'
      run: .\build\Release\xray.exe --version

    - name: Regression Tests (Unix)
      if: runner.os != 'Windows'
      run: |
        chmod +x ./scripts/run_regression_tests.sh
        ./scripts/run_regression_tests.sh
      env:
        XRAY_PATH: ./build/xray

    # Windows regression tests (if script supports it)
    # - name: Regression Tests (Windows)
    #   if: runner.os == 'Windows'
    #   run: ...

  # ===========================================================================
  # Unit Tests (ctest, Debug mode)
  # Runs the full unit-test suite under tests/unit/, including
  # test_jit_e2e which contains the §10.1-§10.7 JIT codegen hardening
  # regressions. Debug mode is used because:
  #   - assertions are active (Release strips DCHECK)
  #   - matches the local development build mode used by the project
  # ubuntu-latest (x86_64) is the only native-x64 path for the JIT
  # backend tests; the dev host is Apple Silicon ARM64.
  #
  # Intentionally NOT gated on arch-lint: backend correctness (LSRA,
  # codegen, JIT entry/OSR/deopt) is independent of the frontend
  # header-size policy. Keeping these in parallel avoids losing x64
  # signal whenever a frontend header drifts over the line cap.
  # ===========================================================================
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS ARM64

    runs-on: ${{ matrix.os }}
    name: Unit Tests (${{ matrix.name }})

    steps:
    - uses: actions/checkout@v4

    - name: Configure (Debug)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build -j

    - name: Run ctest
      working-directory: build
      run: ctest --output-on-failure --timeout 120

  # ===========================================================================
  # Static Analysis (clang-tidy)
  # ===========================================================================
  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis (clang-tidy)

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy-14

    - name: Generate compile_commands.json
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++

    - name: Run clang-tidy on core modules
      run: |
        # Run clang-tidy on critical modules (lexer, parser, vm, gc)
        # Using find + xargs for parallel execution
        find src/frontend src/vm src/gc src/value src/object \
          -name '*.c' -type f | \
        xargs -P$(nproc) -I{} \
          clang-tidy-14 -p build {} \
          --warnings-as-errors='bugprone-use-after-move,bugprone-double-free,clang-analyzer-core.*' \
          2>&1 | tee clang-tidy-output.txt

        # Check for errors (warnings are allowed, errors fail the build)
        if grep -q "error:" clang-tidy-output.txt; then
          echo "clang-tidy found errors!"
          exit 1
        fi
        echo "clang-tidy passed (warnings may exist but no errors)"

    - name: Upload clang-tidy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report
        path: clang-tidy-output.txt
        retention-days: 7

  # ===========================================================================
  # Sanitizer Tests (ASan + UBSan)
  # ===========================================================================
  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: AddressSanitizer
            cmake_flag: ENABLE_ASAN
            short: asan
          - name: UndefinedBehaviorSanitizer
            cmake_flag: ENABLE_UBSAN
            short: ubsan
          - name: ThreadSanitizer
            cmake_flag: ENABLE_TSAN
            short: tsan

    runs-on: ubuntu-latest
    name: ${{ matrix.sanitizer.name }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure with ${{ matrix.sanitizer.name }}
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -D${{ matrix.sanitizer.cmake_flag }}=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run unit tests with ${{ matrix.sanitizer.name }}
      run: |
        cd build
        ctest --output-on-failure --timeout 120

    - name: Run regression tests with ${{ matrix.sanitizer.name }}
      run: |
        chmod +x ./scripts/run_regression_tests.sh
        ./scripts/run_regression_tests.sh
      env:
        XRAY_PATH: ./build/xray
        # ASan/UBSan runtime options
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:symbolize=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

  # ===========================================================================
  # Code Coverage Report
  # ===========================================================================
  coverage:
    runs-on: ubuntu-latest
    name: Code Coverage

    steps:
    - uses: actions/checkout@v4

    - name: Install lcov
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov

    - name: Configure with coverage
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run unit tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Run regression tests
      run: |
        chmod +x ./scripts/run_regression_tests.sh
        ./scripts/run_regression_tests.sh || true  # Don't fail on test failures
      env:
        XRAY_PATH: ./build/xray

    - name: Generate coverage report
      run: |
        # Capture coverage data
        lcov --capture --directory build --output-file coverage.info

        # Remove system headers and test files
        lcov --remove coverage.info \
          '/usr/*' \
          '*/tests/*' \
          '*/stdlib/*' \
          --output-file coverage.info

        # Generate summary
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.info
        fail_ci_if_error: false
        verbose: true

    - name: Generate HTML report
      run: |
        genhtml coverage.info --output-directory coverage-report

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
        retention-days: 7

  # ===========================================================================
  # Code Format Check
  # ===========================================================================
  format-check:
    runs-on: ubuntu-latest
    name: Code Format Check

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-14

    - name: Check code format
      run: |
        # Find all source files and check format
        find src include stdlib \
          \( -name '*.c' -o -name '*.h' \) -type f | \
        xargs clang-format-14 --dry-run --Werror 2>&1 | tee format-check.txt

        if [ -s format-check.txt ]; then
          echo "Code format issues found. Run 'make format' to fix."
          exit 1
        fi
        echo "Code format check passed"
