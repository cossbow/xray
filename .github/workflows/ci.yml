name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ===========================================================================
  # Architecture lint (Phase 3, X-01 / C-01 / C-02)
  # Fast grep-only check that catches frontend boundary violations
  # before we spend a build-budget. See scripts/check_frontend_arch.sh
  # for the rule list.
  # ===========================================================================
  arch-lint:
    runs-on: ubuntu-latest
    name: Frontend Architecture Lint
    steps:
    - uses: actions/checkout@v4

    - name: Run frontend architecture lint
      run: |
        chmod +x ./scripts/check_frontend_arch.sh
        ./scripts/check_frontend_arch.sh

  # ===========================================================================
  # Reverse-invariant seed checks (codegen hardening foundation).
  # Three lightweight grep-based gates:
  #   E.1  no new silent fallback (default: break;) outside the
  #        recorded baseline in tests/baseline_silent_fallback.txt
  #   E.2  no legacy_helper / old_emit / XR_COMPAT / deprecated_call
  #        wrappers anywhere in src/
  #   E.3  build/generated/ is never tracked by git
  # Plus an expiry gate on tests/known_failures.txt: every active
  # suppression entry must carry ISSUE / ADDED <= 30 days / OWNER.
  # See scripts/check_codegen_invariants.sh and
  #     scripts/check_known_failures_freshness.sh for details.
  # ===========================================================================
  reverse-invariants:
    runs-on: ubuntu-latest
    name: Reverse-Invariant Seed Checks
    steps:
    - uses: actions/checkout@v4

    - name: Codegen invariants (silent fallback / legacy wrappers / generated tree)
      run: |
        chmod +x ./scripts/check_codegen_invariants.sh
        ./scripts/check_codegen_invariants.sh

    - name: known_failures.txt freshness (<= 30 days)
      run: |
        chmod +x ./scripts/check_known_failures_freshness.sh
        ./scripts/check_known_failures_freshness.sh

  # ===========================================================================
  # Build & Test (multi-platform)
  # ===========================================================================
  build:
    needs: arch-lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-2022
            name: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
    - uses: actions/checkout@v4

    - name: Install zlib (Windows)
      if: runner.os == 'Windows'
      # zlib is a hard requirement for stdlib/compress, stdlib/http and
      # stdlib/ws. macOS/Linux runners ship it via the system; on
      # Windows we provision it through vcpkg so find_package(ZLIB)
      # succeeds and compress_zlib.c gets compiled in.
      shell: pwsh
      run: |
        vcpkg install zlib:x64-windows-release
        echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
        echo "VCPKG_TARGET_TRIPLET=x64-windows-release" >> $env:GITHUB_ENV

    - name: Configure (Unix)
      if: runner.os != 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Configure (Windows)
      if: runner.os == 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

    - name: Build
      run: cmake --build build --config Release

    - name: Verify binary
      if: runner.os != 'Windows'
      run: ./build/xray --version

    - name: Verify binary (Windows)
      if: runner.os == 'Windows'
      run: .\build\Release\xray.exe --version

    - name: Regression Tests (Unix)
      if: runner.os != 'Windows'
      # Some regression tests cover in-progress features (generics,
      # struct, JIT deopt) and are expected to fail until implemented.
      continue-on-error: true
      run: |
        chmod +x ./scripts/run_regression_tests.sh
        ./scripts/run_regression_tests.sh
      env:
        XRAY_PATH: ./build/xray

    # Windows regression tests (if script supports it)
    # - name: Regression Tests (Windows)
    #   if: runner.os == 'Windows'
    #   run: ...

  # ===========================================================================
  # Unit Tests (ctest, Debug mode)
  # Runs the full unit-test suite under tests/unit/, including
  # test_jit_e2e which contains the §10.1-§10.7 JIT codegen hardening
  # regressions. Debug mode is used because:
  #   - assertions are active (Release strips DCHECK)
  #   - matches the local development build mode used by the project
  # ubuntu-latest (x86_64) is the only native-x64 path for the JIT
  # backend tests; the dev host is Apple Silicon ARM64.
  #
  # Intentionally NOT gated on arch-lint: backend correctness (LSRA,
  # codegen, JIT entry/OSR/deopt) is independent of the frontend
  # header-size policy. Keeping these in parallel avoids losing x64
  # signal whenever a frontend header drifts over the line cap.
  # ===========================================================================
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            # JIT x86_64 backend has never been validated on a native
            # x64 host: the most basic ADD round-trips wrong values. VM
            # test_vm_exception SEGFAULTs in the Linux Debug build but
            # passes on macOS — both predate this CI work and have
            # their own follow-up tasks. Exclude them so the remaining
            # 84/86 unit tests act as a real Linux x64 quality gate.
            ctest_args: >-
              --output-on-failure --timeout 120
              --exclude-regex '^(test_jit_e2e|test_vm_exception)$'
          - os: macos-latest
            name: macOS ARM64
            ctest_args: --output-on-failure --timeout 120

    runs-on: ${{ matrix.os }}
    name: Unit Tests (${{ matrix.name }})

    steps:
    - uses: actions/checkout@v4

    - name: Configure (Debug)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build -j

    - name: Run ctest
      working-directory: build
      run: ctest ${{ matrix.ctest_args }}

  # ===========================================================================
  # Static Analysis (clang-tidy)
  # ===========================================================================
  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis (clang-tidy)
    # Many clang-analyzer-core.* false positives on complex control flow.
    # Report results without blocking the pipeline.
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy-14

    - name: Generate compile_commands.json
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++

    - name: Run clang-tidy on core modules
      run: |
        # Run clang-tidy on critical modules (lexer, parser, vm, gc)
        # Using find + xargs for parallel execution
        find src/frontend src/vm src/runtime/gc src/runtime/value src/runtime/object \
          -name '*.c' ! -name '*.inc.c' -type f | \
        xargs -P$(nproc) -I{} \
          clang-tidy-14 -p build {} \
          2>&1 | tee clang-tidy-output.txt

        # Check for errors (warnings are allowed, errors fail the build)
        if grep -q "error:" clang-tidy-output.txt; then
          echo "clang-tidy found errors!"
          exit 1
        fi
        echo "clang-tidy passed (warnings may exist but no errors)"

    - name: Upload clang-tidy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: clang-tidy-report
        path: clang-tidy-output.txt
        retention-days: 7

  # ===========================================================================
  # Sanitizer Tests (ASan + UBSan)
  # ===========================================================================
  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: AddressSanitizer
            cmake_flag: ENABLE_ASAN
            short: asan
          - name: UndefinedBehaviorSanitizer
            cmake_flag: ENABLE_UBSAN
            short: ubsan
          - name: ThreadSanitizer
            cmake_flag: ENABLE_TSAN
            short: tsan

    runs-on: ubuntu-latest
    name: ${{ matrix.sanitizer.name }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure with ${{ matrix.sanitizer.name }}
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -D${{ matrix.sanitizer.cmake_flag }}=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    # See unit-tests job: test_jit_e2e (x64 backend) and
    # test_vm_exception are pre-existing failures excluded from CI.
    - name: Run unit tests with ${{ matrix.sanitizer.name }}
      run: |
        cd build
        ctest --output-on-failure --timeout 120 \
              --exclude-regex '^(test_jit_e2e|test_vm_exception)$'
      env:
        # Leak detection disabled: unit tests don't fully tear down
        # isolates/GC. Real memory errors (OOB, UAF) still abort.
        ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:symbolize=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

    - name: Run regression tests with ${{ matrix.sanitizer.name }}
      continue-on-error: true
      run: |
        chmod +x ./scripts/run_regression_tests.sh
        ./scripts/run_regression_tests.sh
      env:
        XRAY_PATH: ./build/xray
        ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:symbolize=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

  # ===========================================================================
  # Code Coverage Report
  # ===========================================================================
  coverage:
    runs-on: ubuntu-latest
    name: Code Coverage

    steps:
    - uses: actions/checkout@v4

    - name: Install lcov
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov

    - name: Configure with coverage
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    # See unit-tests job: test_jit_e2e (x64 backend) and
    # test_vm_exception are pre-existing failures excluded from CI.
    - name: Run unit tests
      run: |
        cd build
        ctest --output-on-failure \
              --exclude-regex '^(test_jit_e2e|test_vm_exception)$'

    - name: Run regression tests
      run: |
        chmod +x ./scripts/run_regression_tests.sh
        ./scripts/run_regression_tests.sh || true  # Don't fail on test failures
      env:
        XRAY_PATH: ./build/xray

    - name: Generate coverage report
      run: |
        # Capture coverage data.  --ignore-errors negative works around
        # gcov race-condition counters that occasionally go below zero.
        lcov --capture --directory build --output-file coverage.info \
          --ignore-errors negative,mismatch

        # Remove system headers and test files
        lcov --remove coverage.info \
          '/usr/*' \
          '*/tests/*' \
          '*/stdlib/*' \
          --output-file coverage.info \
          --ignore-errors negative,mismatch

        # Generate summary
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.info
        fail_ci_if_error: false
        verbose: true

    - name: Generate HTML report
      run: |
        genhtml coverage.info --output-directory coverage-report

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
        retention-days: 7

  # ===========================================================================
  # Code Format Check
  # ===========================================================================
  format-check:
    runs-on: ubuntu-latest
    name: Code Format Check

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format-19
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
        sudo apt-get update
        sudo apt-get install -y clang-format-19
        clang-format-19 --version

    - name: Check code format
      run: |
        find src include stdlib \
          \( -name '*.c' -o -name '*.h' \) -type f | \
        xargs clang-format-19 --dry-run --Werror 2>&1 | tee format-check.txt

        if [ -s format-check.txt ]; then
          echo "Code format issues found. Run 'make format' to fix."
          exit 1
        fi
        echo "Code format check passed"

  # ===========================================================================
  # JIT-force PR matrix
  # ---------------------------------------------------------------------------
  # Forces every eligible regression test through the JIT compilation
  # path under a sanitizer-enabled build. This matrix exposes codegen
  # / GC / coroutine corruption that the default lazy-JIT lane fails
  # to surface (the May 2026 11-bug corruption family was only
  # reproducible under --jit-force + ASan).
  #
  # Three host configurations land first:
  #   - linux-asan-ubsan : ASan + UBSan + MALLOC_PERTURB_, the highest
  #                       signal lane (covers UAF, OOB, signed UB,
  #                       use-of-uninit on Linux glibc)
  #   - macos-arm64-asan: MallocScribble + ASan, mirrors the Apple
  #                       Silicon dev host; catches macOS-specific
  #                       layout drift early
  #   - windows-msvc-dbg: /MDd already provides 0xCD / 0xDD heap fill
  #                       equivalent to MallocScribble; covers MSVC
  #                       calling-convention bugs (RCX / R10 / R11)
  #
  # The remaining three configurations from the 082 plan (Linux MSan,
  # macOS x64 ASan, Windows MSVC Release with Win11 coroutine cases)
  # live in nightly.yml because they are either slower or more
  # platform-specific.
  #
  # continue-on-error is set to true during the W1 baseline so the
  # first full-matrix run produces complete sanitizer output for
  # triage. It MUST flip to false at the 082 W3 checkpoint; the
  # tightening is tracked in tests/known_failures.txt with a 30-day
  # expiry gate, which fails CI on its own if the deadline slips.
  # ===========================================================================
  jit-force-pr:
    needs: [arch-lint, reverse-invariants]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-asan-ubsan-jit
            os: ubuntu-latest
            short_name: linux-asan
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Debug
              -DENABLE_ASAN=ON
              -DENABLE_UBSAN=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++

          - name: macos-arm64-asan-jit
            os: macos-latest
            short_name: macos-arm64-asan
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Debug
              -DENABLE_ASAN=ON
              -DENABLE_UBSAN=ON

          - name: windows-msvc-debug-jit
            os: windows-2022
            short_name: windows-msvc-debug
            # MSVC /MDd already provides 0xCD / 0xDD heap fill; no
            # explicit sanitizer flag is needed and MSVC ASan adds
            # noise around CRT internals.
            cmake_flags: -DCMAKE_BUILD_TYPE=Debug

    runs-on: ${{ matrix.os }}
    name: JIT-force PR (${{ matrix.short_name }})
    # W1 baseline: the matrix is expected to surface latent codegen
    # bugs as it ramps up. Tightening is tracked by
    # tests/known_failures.txt with a 30-day expiry gate.
    continue-on-error: true

    env:
      XRAY_JIT_FORCE: "1"
      ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:symbolize=1:strict_string_checks=1:detect_stack_use_after_return=1:poison_partial=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
      # Dump per-test stdout/stderr (incl. sanitizer reports) at the
      # end of the regression run so the W2 triage no longer needs a
      # local sanitizer build to read root causes.
      XRAY_TEST_DUMP_FAILED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang ninja-build
          echo "MALLOC_PERTURB_=205" >> $GITHUB_ENV

      - name: Enable MallocScribble (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "MallocScribble=1" >> $GITHUB_ENV
          echo "MallocPreScribble=1" >> $GITHUB_ENV
          echo "MallocGuardEdges=1" >> $GITHUB_ENV

      - name: Install zlib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows-release
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows-release" >> $env:GITHUB_ENV

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build ${{ matrix.cmake_flags }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >-
          cmake -B build ${{ matrix.cmake_flags }}
          -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"
          -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

      - name: Build
        run: cmake --build build --config Debug -j

      - name: Run regression tests (--jit-force, Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/run_regression_tests.sh
          ./scripts/run_regression_tests.sh
        env:
          XRAY_PATH: ./build/xray
          XRAY_BUILD_DIR: ./build
          # ASan + UBSan + JIT-force triples per-test runtime vs the
          # plain interpreter (instrumented JIT compile + deopt paths
          # cost the most), so the default 10s budget races coroutine
          # / channel stress tests on the Linux runners. Bumping to
          # 60s keeps slow-but-correct runs green; any test still
          # exceeding this is a real hang and worth investigating.
          XRAY_TEST_TIMEOUT: "60"

      - name: Run regression tests (--jit-force, Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./scripts/run_regression_tests.sh
        env:
          XRAY_PATH: ./build/Debug/xray.exe
          XRAY_BUILD_DIR: ./build
          XRAY_TEST_TIMEOUT: "60"
